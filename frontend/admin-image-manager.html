<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Manager | Mockly Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --border-glass: rgba(0, 0, 0, 0.1);
        }

        .dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --glass-bg: rgba(30, 41, 59, 0.95);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Open Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); line-height: 1.6; }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 35px; height: 35px; background: var(--primary); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .nav-links a { margin-left: 20px; color: var(--text-muted); text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a.active { color: var(--primary); }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-actions h1 { font-size: 2rem; color: var(--text-main); }
        
        .upload-card {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .upload-card:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.02);
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
            display: inline-block;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }

        .file-input-wrapper {
            margin: 20px 0;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 1px solid var(--border);
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-main);
            transition: all 0.3s;
        }
        .custom-file-upload:hover { background: var(--border); }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .image-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .image-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .image-details {
            padding: 15px;
        }
        
        .image-filename {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 10px;
        }

        .copy-btn {
            width: 100%;
            padding: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background: var(--success);
            color: white;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 5px;
            margin-top: 10px;
            width: 100%;
            font-size: 0.9rem;
        }
        .delete-btn:hover { text-decoration: underline; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            color: var(--text-main);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-left: 4px solid var(--success);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        .toast.show { transform: translateX(0); }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <a href="admin.html" class="logo">
                <div class="logo-icon">M</div>
                Mockly Admin
            </a>
            <div class="nav-links">
                <a href="admin.html">Dashboard</a>
                <a href="admin-manage-papers.html">Mock Papers</a>
                <a href="admin-image-manager.html" class="active">Image Manager</a>
                <button id="themeToggle" style="background:none;border:none;color:var(--text-muted);cursor:pointer;margin-left:20px;">
                    <i class="fa-solid fa-moon dark-icon"></i>
                    <i class="fa-solid fa-sun light-icon" style="display:none;"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header-actions">
            <h1>Image Manager</h1>
        </div>

        <div class="upload-card">
            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
            <h3>Upload New Image</h3>
            <p style="color: var(--text-muted); margin-top: 5px;">Upload a screenshot of a table, chart, or math equation.</p>
            
            <div class="file-input-wrapper">
                <label for="imageUpload" class="custom-file-upload">
                    <i class="fa-solid fa-image"></i> Choose Image...
                </label>
                <input id="imageUpload" type="file" accept="image/*" onchange="handleFileSelect(event)" />
            </div>
            
            <div id="selectedFileName" style="margin-bottom: 15px; font-weight: 600; color: var(--primary);"></div>
            
            <button id="uploadBtn" class="btn-primary" onclick="uploadImage()" disabled>
                Upload Image
            </button>
        </div>

        <h2 style="margin-bottom: 20px;">Uploaded Images</h2>
        <div class="image-grid" id="imageGrid">
            <!-- Images will be loaded here -->
        </div>
    </div>

    <div id="toast" class="toast">Link copied to clipboard!</div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'index.html';

        let selectedFile = null;

        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        function setTheme(isDark) {
            html.classList.toggle('dark', isDark);
            document.querySelector('.dark-icon').style.display = isDark ? 'none' : 'block';
            document.querySelector('.light-icon').style.display = isDark ? 'block' : 'none';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        setTheme(localStorage.getItem('theme') === 'dark');
        if(themeToggle) themeToggle.addEventListener('click', () => setTheme(!html.classList.contains('dark')));

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            const btn = document.getElementById('uploadBtn');
            const nameDisplay = document.getElementById('selectedFileName');
            
            if (selectedFile) {
                nameDisplay.textContent = selectedFile.name;
                btn.disabled = false;
            } else {
                nameDisplay.textContent = '';
                btn.disabled = true;
            }
        }

        async function uploadImage() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('image', selectedFile);

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';

            try {
                const res = await fetch(((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '/api/upload', {
                    method: 'POST',
                    headers: { 'x-auth-token': token },
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    // Reset input
                    document.getElementById('imageUpload').value = '';
                    selectedFile = null;
                    document.getElementById('selectedFileName').textContent = '';
                    btn.innerHTML = 'Upload Image';
                    
                    // Copy newly uploaded URL automatically
                    copyToClipboard(data.imageUrl);
                    
                    // Refresh list
                    loadImages();
                } else {
                    alert('Error: ' + data.message);
                    btn.disabled = false;
                    btn.innerHTML = 'Upload Image';
                }
            } catch (err) {
                alert('Upload failed.');
                btn.disabled = false;
                btn.innerHTML = 'Upload Image';
            }
        }

        async function loadImages() {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '<p style="color:var(--text-muted)">Loading images...</p>';
            
            try {
                const res = await fetch(((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '/api/upload/list', {
                    headers: { 'x-auth-token': token }
                });
                const data = await res.json();
                
                if (data.success) {
                    grid.innerHTML = '';
                    if (data.images.length === 0) {
                        grid.innerHTML = '<p style="color:var(--text-muted)">No images uploaded yet.</p>';
                        return;
                    }
                    
                    data.images.forEach(img => {
                        const card = document.createElement('div');
                        card.className = 'image-card';
                        card.innerHTML = `
                            <img src="${img.url}" class="image-preview" alt="Uploaded Image">
                            <div class="image-details">
                                <div class="image-filename" title="${img.filename}">${img.filename}</div>
                                <button class="copy-btn" onclick="copyToClipboard('${img.url}')">
                                    <i class="fa-solid fa-link"></i> Copy Link
                                </button>
                                <button class="delete-btn" onclick="deleteImage('${img.filename}')">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                grid.innerHTML = '<p style="color:red">Failed to load images.</p>';
            }
        }

        function copyToClipboard(url) {
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        async function deleteImage(filename) {
            if(!confirm('Are you sure you want to delete this image?')) return;
            try {
                const res = await fetch(`${((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '' : 'https://mockly-backend-fk2i.onrender.com')}/api/upload/${filename}`, {
                    method: 'DELETE',
                    headers: { 'x-auth-token': token }
                });
                const data = await res.json();
                if(data.success) {
                    loadImages();
                } else {
                    alert('Failed to delete: ' + data.message);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        window.onload = loadImages;
    </script>
</body>
</html>
