<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - Mockly Admin</title>
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="sidebar-brand">
                <i class="fa-solid fa-graduation-cap"></i> Mockly Admin
            </a>
        </div>
        
        <div class="sidebar-menu">
            <div class="menu-label">Main Menu</div>
            <a href="dashboard.html" class="menu-item">
                <i class="fa-solid fa-house"></i> Dashboard Overview
            </a>
            <a href="manage-tests.html" class="menu-item">
                <i class="fa-solid fa-file-lines"></i> Manage Tests
            </a>
            <a href="create-test.html" class="menu-item">
                <i class="fa-solid fa-plus-circle"></i> Create New Test
            </a>
            <a href="question-bank.html" class="menu-item active">
                <i class="fa-solid fa-database"></i> Question Bank
            </a>
            
            <div class="menu-label" style="margin-top: 20px;">Reports</div>
            <a href="analytics.html" class="menu-item">
                <i class="fa-solid fa-chart-line"></i> Analytics & Results
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-users"></i> Students
            </a>
        </div>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logoutAdmin()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="page-title">Question Bank Repository</div>
            
            <div class="nav-actions">
                <div class="admin-profile" style="margin-left: 20px;">
                    <div class="avatar">A</div>
                    <span style="font-weight: 500;">Admin User</span>
                </div>
            </div>
        </header>

        <!-- Dashboard Body -->
        <div class="dashboard-body">
            
            <div class="card-panel">
                <!-- Search & Filters -->
                <div class="card-header" style="flex-direction: row; gap: 15px; background: #f8fafc; border-bottom: 1px solid var(--border-color); padding: 15px 20px;">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search questions by text..." style="max-width: 400px; margin-bottom: 0;">
                    <select id="subjectFilter" class="form-control" style="max-width: 200px; margin-bottom: 0;">
                        <option value="">All Subjects</option>
                        <option value="Quantitative Aptitude">Quantitative Aptitude</option>
                        <option value="General Intelligence">General Intelligence</option>
                        <option value="English Comprehension">English Comprehension</option>
                        <option value="General Awareness">General Awareness</option>
                    </select>
                    <button class="btn-primary" onclick="fetchQuestions(1)">
                        <i class="fa-solid fa-magnifying-glass"></i> Search
                    </button>
                </div>

                <!-- Data Table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 50%;">Question (English)</th>
                                <th>Subject</th>
                                <th>Marks (+/-)</th>
                                <th>Date Added</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="questionsTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 30px;">
                                    <i class="fa-solid fa-spinner fa-spin"></i> Loading questions...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color);">
                    <div id="paginationInfo" style="color: var(--text-muted); font-size: 0.9rem;">
                        Showing page 1 of 1
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-primary" id="btnPrev" onclick="changePage(-1)" style="background: #cbd5e1; color: #333;" disabled>Previous</button>
                        <button class="btn-primary" id="btnNext" onclick="changePage(1)">Next</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Edit Question Modal -->
    <div id="editModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content card-panel" style="width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; background: #fff; padding: 0;">
            <div class="card-header" style="position: sticky; top: 0; background: #fff; z-index: 10;">
                <h2>Edit Question</h2>
                <button class="btn-danger" onclick="closeEditModal()" style="background: transparent; color: var(--text-muted); box-shadow: none;"><i class="fa-solid fa-xmark" style="font-size: 1.5rem;"></i></button>
            </div>
            
            <div class="form-section" style="padding: 20px;">
                <input type="hidden" id="editQId">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Question Text (English) *</label>
                        <textarea id="editQEn" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Question Text (Hindi)</label>
                        <textarea id="editQHi" class="form-control" rows="3"></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="editSubject" class="form-control">
                </div>

                <div class="form-group">
                    <label>Options & Correct Answer *</label>
                    <div class="q-options-grid">
                        <div class="opt-row">
                            <strong>A</strong>
                            <input type="text" id="editOpt0En" required placeholder="English">
                            <input type="text" id="editOpt0Hi" placeholder="Hindi">
                            <input type="radio" class="correct-radio" name="editCorrect" value="0">
                        </div>
                        <div class="opt-row">
                            <strong>B</strong>
                            <input type="text" id="editOpt1En" required placeholder="English">
                            <input type="text" id="editOpt1Hi" placeholder="Hindi">
                            <input type="radio" class="correct-radio" name="editCorrect" value="1">
                        </div>
                        <div class="opt-row">
                            <strong>C</strong>
                            <input type="text" id="editOpt2En" required placeholder="English">
                            <input type="text" id="editOpt2Hi" placeholder="Hindi">
                            <input type="radio" class="correct-radio" name="editCorrect" value="2">
                        </div>
                        <div class="opt-row">
                            <strong>D</strong>
                            <input type="text" id="editOpt3En" required placeholder="English">
                            <input type="text" id="editOpt3Hi" placeholder="Hindi">
                            <input type="radio" class="correct-radio" name="editCorrect" value="3">
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Marks (+)</label>
                        <input type="number" id="editMarks" class="form-control" step="0.5" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Negative Marks (-)</label>
                        <input type="number" id="editNegative" class="form-control" step="0.01" required>
                    </div>
                </div>

                <div style="margin-top: 20px; text-align: right;">
                    <button class="btn-primary" onclick="saveQuestionEdit()" id="btnSaveEdit">
                        <i class="fa-solid fa-save"></i> Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

        </div>
    </main>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            alert('Unauthorized access. Please login as Admin.');
            window.location.href = '../index.html';
        }

        function logoutAdmin() {
            localStorage.removeItem('adminToken');
            window.location.href = '../index.html';
        }

        let currentPage = 1;
        let totalPages = 1;
        let allQuestionsCache = [];

        async function fetchQuestions(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const subject = document.getElementById('subjectFilter').value;
            const tbody = document.getElementById('questionsTableBody');
            
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</td></tr>';
            
            try {
                let url = \`${((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '' : 'https://mockly-backend-fk2i.onrender.com')}/api/questions?page=\${page}&limit=50\`;
                if (search) url += \`&search=\${encodeURIComponent(search)}\`;
                if (subject) url += \`&subject=\${encodeURIComponent(subject)}\`;

                const res = await fetch(url, {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'x-auth-token': token
                    }
                });
                const data = await res.json();
                
                if (data.success) {
                    totalPages = data.totalPages;
                    allQuestionsCache = data.questions;
                    renderTable(data.questions);
                    
                    document.getElementById('paginationInfo').innerText = \`Showing page \${currentPage} of \${totalPages} (\${data.totalQuestions} total questions)\`;
                    document.getElementById('btnPrev').disabled = currentPage === 1;
                    document.getElementById('btnPrev').style.background = currentPage === 1 ? '#cbd5e1' : 'var(--primary-dark)';
                    document.getElementById('btnNext').disabled = currentPage === totalPages || totalPages === 0;
                    document.getElementById('btnNext').style.background = (currentPage === totalPages || totalPages === 0) ? '#cbd5e1' : 'var(--primary-dark)';
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Error loading questions.</td></tr>';
            }
        }

        function renderTable(questions) {
            const tbody = document.getElementById('questionsTableBody');
            if (questions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px;">No questions found.</td></tr>';
                return;
            }

            tbody.innerHTML = questions.map(q => \`
                <tr>
                    <td>
                        <div style="font-weight: 500; color: var(--primary-dark); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                            \${q.questionText.english || 'N/A'}
                        </div>
                    </td>
                    <td><span class="badge">\${q.subject || 'General'}</span></td>
                    <td>+\${q.marks} / -\${q.negativeMarks}</td>
                    <td>\${new Date(q.createdAt).toLocaleDateString()}</td>
                    <td style="text-align: right;">
                        <button class="btn-primary" style="padding: 6px 12px; font-size: 0.85rem;" onclick="openEditModal('\${q._id}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-danger" style="padding: 6px 12px; font-size: 0.85rem;" onclick="deleteQuestion('\${q._id}')"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            \`).join('');
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                fetchQuestions(newPage);
            }
        }

        async function deleteQuestion(id) {
            if(!confirm('Are you sure you want to permanently delete this question? This may affect existing tests.')) return;
            try {
                const res = await fetch(\`${((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '' : 'https://mockly-backend-fk2i.onrender.com')}/api/questions/\${id}\`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'x-auth-token': token
                    }
                });
                const data = await res.json();
                if(data.success) {
                    fetchQuestions(currentPage);
                } else {
                    alert('Failed to delete: ' + data.message);
                }
            } catch (err) {
                alert('Error deleting question.');
            }
        }

        // --- EDIT MODAL LOGIC ---
        function openEditModal(id) {
            const q = allQuestionsCache.find(x => x._id === id);
            if(!q) return;

            document.getElementById('editQId').value = q._id;
            document.getElementById('editQEn').value = q.questionText.english;
            document.getElementById('editQHi').value = q.questionText.hindi || '';
            document.getElementById('editSubject').value = q.subject || '';
            
            for(let i=0; i<4; i++) {
                if(q.options[i]) {
                    document.getElementById(\`editOpt\${i}En\`).value = q.options[i].english || '';
                    document.getElementById(\`editOpt\${i}Hi\`).value = q.options[i].hindi || '';
                }
            }
            
            const radios = document.querySelectorAll('input[name="editCorrect"]');
            radios.forEach(r => {
                r.checked = (Number(r.value) === q.correctOptionIndex);
            });

            document.getElementById('editMarks').value = q.marks;
            document.getElementById('editNegative').value = q.negativeMarks;

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function saveQuestionEdit() {
            const id = document.getElementById('editQId').value;
            const btn = document.getElementById('btnSaveEdit');
            
            const correctRadio = document.querySelector('input[name="editCorrect"]:checked');
            const correctOptionIndex = correctRadio ? Number(correctRadio.value) : 0;

            const payload = {
                questionText: {
                    english: document.getElementById('editQEn').value,
                    hindi: document.getElementById('editQHi').value
                },
                subject: document.getElementById('editSubject').value,
                options: [
                    { english: document.getElementById('editOpt0En').value, hindi: document.getElementById('editOpt0Hi').value },
                    { english: document.getElementById('editOpt1En').value, hindi: document.getElementById('editOpt1Hi').value },
                    { english: document.getElementById('editOpt2En').value, hindi: document.getElementById('editOpt2Hi').value },
                    { english: document.getElementById('editOpt3En').value, hindi: document.getElementById('editOpt3Hi').value }
                ],
                correctOptionIndex: correctOptionIndex,
                marks: Number(document.getElementById('editMarks').value),
                negativeMarks: Number(document.getElementById('editNegative').value)
            };

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                const res = await fetch(\`${((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '' : 'https://mockly-backend-fk2i.onrender.com')}/api/questions/\${id}\`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token,
                        'x-auth-token': token
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.success) {
                    closeEditModal();
                    fetchQuestions(currentPage); // Refresh current page
                } else {
                    alert('Error saving question: ' + data.message);
                }
            } catch (err) {
                alert('Error connecting to server.');
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-save"></i> Save Changes';
                btn.disabled = false;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchQuestions(1);
        });
    </script>
</body>
</html>
