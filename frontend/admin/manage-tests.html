<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tests - Mockly Admin</title>
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="sidebar-brand">
                <i class="fa-solid fa-graduation-cap"></i> Mockly Admin
            </a>
        </div>
        
        <div class="sidebar-menu">
            <div class="menu-label">Main Menu</div>
            <a href="dashboard.html" class="menu-item">
                <i class="fa-solid fa-house"></i> Dashboard Overview
            </a>
            <a href="manage-tests.html" class="menu-item active">
                <i class="fa-solid fa-file-lines"></i> Manage Tests
            </a>
            <a href="create-test.html" class="menu-item">
                <i class="fa-solid fa-plus-circle"></i> Create New Test
            </a>
            <a href="question-bank.html" class="menu-item">
                <i class="fa-solid fa-database"></i> Question Bank
            </a>
            
            <div class="menu-label" style="margin-top: 20px;">Reports</div>
            <a href="analytics.html" class="menu-item">
                <i class="fa-solid fa-chart-line"></i> Analytics & Results
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-users"></i> Students
            </a>
        </div>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logoutAdmin()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="page-title">Manage Tests</div>
            
            <div class="nav-actions">
                <a href="create-test.html" class="btn-primary">
                    <i class="fa-solid fa-plus"></i> Create New Test
                </a>
                <div class="admin-profile" style="margin-left: 20px;">
                    <div class="avatar">A</div>
                    <span style="font-weight: 500;">Admin User</span>
                </div>
            </div>
        </header>

        <!-- Dashboard Body -->
        <div class="dashboard-body">
            
            <div class="card-panel">
                <div class="card-header">
                    <h2>All Active Test Papers</h2>
                    <div style="display:flex; gap:10px;">
                        <input type="text" class="form-control" id="searchTest" placeholder="Search by test name..." style="width:250px; padding: 6px 12px;">
                        <select class="form-control" style="width:150px; padding: 6px 12px;">
                            <option value="">All Categories</option>
                            <option value="ssc-cgl">SSC CGL</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="testsTable">
                        <thead>
                            <tr>
                                <th>Test Title</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Duration (mins)</th>
                                <th>Marks</th>
                                <th>Created On</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="7" style="text-align: center;">Loading tests...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Check Admin Auth
        const token = localStorage.getItem('adminToken');
        if (!token) {
            alert('Unauthorized access. Please login as Admin.');
            window.location.href = '../index.html';
        }

        function logoutAdmin() {
            localStorage.removeItem('adminToken');
            window.location.href = '../index.html';
        }

        async function fetchTests() {
            try {
                const response = await fetch(((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '/api/papers');
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.querySelector('#testsTable tbody');
                    tbody.innerHTML = '';
                    
                    data.papers.reverse().forEach(paper => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-weight:500;">${paper.title}</td>
                            <td><span class="badge badge-ssc">${(paper.category || '').toUpperCase()}</span></td>
                            <td>${paper.paperType || 'Mock Test'}</td>
                            <td>${paper.duration}</td>
                            <td>${paper.totalMarks}</td>
                            <td style="color:#64748b; font-size:0.875rem;">${new Date(paper.createdAt).toLocaleDateString()}</td>
                            <td>
                                <button class="btn-primary" style="padding: 4px 8px; font-size:0.75rem;" onclick="editTest('${paper._id}')">
                                    <i class="fa-solid fa-pen"></i> Edit
                                </button>
                                <button class="btn-danger" style="margin-left:5px;" onclick="deleteTest('${paper._id}')">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    if (data.papers.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No tests found.</td></tr>';
                    }
                }
            } catch (err) {
                console.error('Failed to fetch tests', err);
            }
        }

        function editTest(id) {
            alert('Edit functionality coming soon (Phase 3). ID: ' + id);
        }

        function deleteTest(id) {
            if(confirm('Are you sure you want to delete this test? This action cannot be undone.')) {
                alert('Delete functionality coming soon (Phase 3). ID: ' + id);
                // Implementation for delete API call
            }
        }

        document.addEventListener('DOMContentLoaded', fetchTests);
    </script>
</body>
</html>
