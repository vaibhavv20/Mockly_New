    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        
        .container { max-width: 1200px; margin: 100px auto 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; font-family: 'Outfit', sans-serif; }
        
        /* Glassmorphism adjustments for table container */
        .glass-container {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .controls input, .controls select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; min-width: 200px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; color: #333; }
        th { background-color: #f8f9fa; font-weight: 600; color: #555; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; color: white; display: inline-block; margin-right: 5px; }
        .badge-admin { background: #6366f1; }
        .badge-premium { background: #f59e0b; }
        .badge-user { background: #10b981; }

        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.3s; }
        .btn-edit { background: #3b82f6; color: white; margin-right: 5px; }
        .btn-edit:hover { background: #2563eb; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-delete:hover { background: #dc2626; }
        
        .pagination { display: flex; justify-content: center; gap: 10px; align-items: center; }
        .pagination button { padding: 8px 15px; border: 1px solid #ccc; background: white; border-radius: 5px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination span { font-weight: 600; }

        /* Modal styling */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 30px; border: 1px solid #888; width: 400px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .modal-content h2 { color: #333; margin-top: 0; font-family: 'Outfit', sans-serif; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        .modal-body { margin-top: 20px; }
        .modal-body label { display: block; margin-bottom: 12px; font-weight: 500; color: #444; font-size: 1.05rem; cursor: pointer; }
        .modal-body label input { margin-right: 8px; cursor: pointer; }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="glass-nav">
        <div class="nav-container">
            <a href="#" class="brand">
                <div class="logo-mark">M</div>
                <span class="brand-text">Mockly</span>
            </a>
            <div class="nav-links">
                <a href="exams.html" class="nav-item">Exams</a>
                <a href="test-details.html" class="nav-item text-purple" style="font-weight: 600;"><i class="fa-solid fa-bolt"></i> Test Series</a>
                <a href="live-tests.html" class="nav-item"><span class="pulse-dot-small text-red"></span> Live Tests</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon dark-icon"></i>
                    <i class="fa-solid fa-sun light-icon" style="display:none;"></i>
                </button>
                <button class="btn-ghost" id="nav-login-btn">Login</button>
                <button class="btn-primary" id="nav-signup-btn">Sign Up Free</button>
                
                <div id="user-menu" style="display: none; align-items: center; gap: 15px;">
                    <a href="dashboard.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit;" title="Go to Dashboard">
                        <img src="assets/avatars/memoji_1.webp" id="nav-avatar" alt="Profile" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-color);">
                        <span id="user-greeting" style="font-weight: 500;"></span>
                    </a>
                    <button class="btn-ghost" id="nav-logout-btn" style="border: 1px solid var(--border-glass);">Logout</button>
                </div>
                <!-- Mobile Menu Toggle -->
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
    <div class="mobile-nav-drawer" id="mobileNavDrawer">
        <div class="drawer-header">
            <a href="#" class="brand">
                <div class="logo-mark">M</div>
                <span class="brand-text">Mockly</span>
            </a>
            <button class="close-drawer-btn" id="closeDrawerBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-links">
            <a href="exams.html" class="drawer-item" style="--anim-order: 1;"><div class="d-icon-box"><i class="fa-solid fa-layer-group"></i></div> Exams</a>
            <a href="test-details.html" class="drawer-item" style="--anim-order: 2;"><div class="d-icon-box text-purple"><i class="fa-solid fa-bolt"></i></div> Test Series</a>
            <a href="live-tests.html" class="drawer-item" style="--anim-order: 3;"><div class="d-icon-box text-red"><i class="fa-solid fa-tower-broadcast"></i></div> Live Tests</a>
        </div>
        <div class="drawer-actions">
            <button class="btn-ghost w-100 mb-2 drawer-login-btn">Login</button>
            <button class="btn-primary w-100 drawer-signup-btn premium-cta">Sign Up Free</button>
        </div>
        <div class="drawer-socials">
            <a href="#" class="d-social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="d-social-link"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </div>

<div class="container glass-container">
    <h1>Manage Users</h1>
    <p style="color: #666; margin-bottom: 20px;">View, search, and manage all users on the platform.</p>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search by name or email..." onkeyup="debounceSearch()">
        <select id="roleFilter" onchange="fetchUsers()">
            <option value="all">All Roles</option>
            <option value="admin">Admins</option>
            <option value="premium">Premium Users</option>
        </select>
    </div>

    <div style="overflow-x: auto;">
        <table id="usersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Joined</th>
                    <th>Roles</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersBody">
                <tr><td colspan="5" style="text-align: center;">Loading users...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)">Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</div>

<!-- Edit Role Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>Edit User Roles</h2>
    <p id="editUserName" style="color: #666; margin-bottom: 15px;"></p>
    <div class="modal-body">
        <label>
            <input type="checkbox" id="isAdminCheckbox"> Is Admin
        </label>
        <label>
            <input type="checkbox" id="isPremiumCheckbox"> Is Premium
        </label>
        <button class="btn btn-edit" style="width: 100%; margin-top: 15px; padding: 10px;" onclick="saveRoles()">Save Changes</button>
    </div>
  </div>
</div>

<script>
    const token = localStorage.getItem('adminToken');
    if (!token) {
        alert('Unauthorized access. Please login as Admin.');
        window.location.href = 'index.html';
    }

    let currentPage = 1;
    let totalPages = 1;
    const limit = 10;
    let searchTimeout = null;
    let currentEditUserId = null;

    async function fetchUsers() {
        const search = document.getElementById('searchInput').value;
        const role = document.getElementById('roleFilter').value;
        const tbody = document.getElementById('usersBody');
        
        try {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Loading...</td></tr>';
            
            const res = await fetch(`${((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '' : 'https://mockly-backend-fk2i.onrender.com')}/api/users?page=${currentPage}&limit=${limit}&search=${encodeURIComponent(search)}&role=${role}`, {
                headers: { 'x-auth-token': token }
            });
            const data = await res.json();
            
            if (data.success) {
                totalPages = data.totalPages || 1;
                document.getElementById('pageInfo').innerText = `Page ${data.currentPage} of ${totalPages}`;
                document.getElementById('prevBtn').disabled = currentPage === 1;
                document.getElementById('nextBtn').disabled = currentPage === totalPages;
                
                renderUsers(data.users);
            } else {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">Error: ${data.msg || 'Failed to fetch users'}</td></tr>`;
            }
        } catch (err) {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">Network Error</td></tr>`;
        }
    }

    function renderUsers(users) {
        const tbody = document.getElementById('usersBody');
        tbody.innerHTML = '';
        
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No users found.</td></tr>';
            return;
        }

        users.forEach(user => {
            let roleBadges = '';
            if (user.isAdmin) roleBadges += `<span class="badge badge-admin">Admin</span>`;
            if (user.isPremium) roleBadges += `<span class="badge badge-premium">Premium</span>`;
            if (!user.isAdmin && !user.isPremium) roleBadges += `<span class="badge badge-user">User</span>`;

            const date = new Date(user.createdAt).toLocaleDateString();

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${user.firstName} ${user.lastName}</td>
                <td>${user.email}</td>
                <td>${date}</td>
                <td>${roleBadges}</td>
                <td>
                    <button class="btn btn-edit" onclick="openModal('${user._id}', '${user.firstName} ${user.lastName}', ${user.isAdmin}, ${user.isPremium})"><i class="fa-solid fa-pen"></i> Edit</button>
                    <button class="btn btn-delete" onclick="deleteUser('${user._id}')"><i class="fa-solid fa-trash"></i> Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 1; // reset to first page on new search
            fetchUsers();
        }, 500);
    }

    function changePage(delta) {
        currentPage += delta;
        fetchUsers();
    }

    // Modal Logic
    const modal = document.getElementById('editModal');
    
    function openModal(id, name, isAdmin, isPremium) {
        currentEditUserId = id;
        document.getElementById('editUserName').innerText = `Modifying roles for: ${name}`;
        document.getElementById('isAdminCheckbox').checked = isAdmin;
        document.getElementById('isPremiumCheckbox').checked = isPremium;
        modal.style.display = 'block';
    }

    function closeModal() {
        modal.style.display = 'none';
        currentEditUserId = null;
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }

    async function saveRoles() {
        if (!currentEditUserId) return;
        
        const isAdmin = document.getElementById('isAdminCheckbox').checked;
        const isPremium = document.getElementById('isPremiumCheckbox').checked;

        try {
            const res = await fetch(`${((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '' : 'https://mockly-backend-fk2i.onrender.com')}/api/users/${currentEditUserId}/role`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'x-auth-token': token
                },
                body: JSON.stringify({ isAdmin, isPremium })
            });
            const data = await res.json();
            
            if (data.success) {
                alert('Roles updated successfully');
                closeModal();
                fetchUsers();
            } else {
                alert('Error updating roles: ' + (data.msg || 'Unknown error'));
            }
        } catch (err) {
            console.error(err);
            alert('Network Error while updating roles');
        }
    }

    async function deleteUser(id) {
        if (confirm("Are you sure you want to permanently delete this user? All their tests and results will also be deleted. This cannot be undone.")) {
            try {
                const res = await fetch(`${((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://mockly-backend-fk2i.onrender.com') + '' : 'https://mockly-backend-fk2i.onrender.com')}/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-auth-token': token }
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('User deleted successfully');
                    // Adjust page if we deleted the last user on the current page
                    fetchUsers();
                } else {
                    alert('Error deleting user: ' + (data.msg || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert('Network Error while deleting user');
            }
        }
    }

    // Initial load
    fetchUsers();
</script>
</body>
</html>
